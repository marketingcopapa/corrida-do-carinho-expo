  :root{
    --marinho:#0a1e4a; --marinho-claro:#123a8c; --azul-marca:#0040a0;
    --verde-copapa:#1d9e5f; --verde-profundo:#0c5c38; --dourado:#c9a24b;
    --creme:#f8f5ee; --rosa:#ff6b8d;
    --fonte-display:'Rockeby','Arial Narrow',Impact,sans-serif;
    --fonte-corpo:'Segoe UI',system-ui,-apple-system,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;}
  body{background:radial-gradient(130% 100% at 50% 0%, var(--marinho-claro) 0%, var(--marinho) 60%);
    color:var(--creme);font-family:var(--fonte-corpo);
    display:flex;flex-direction:column;align-items:center;padding:3vmin 4vmin;}
  header{text-align:center;}
  .marca{font-family:var(--fonte-display);font-size:clamp(14px,2.2vmin,24px);
    letter-spacing:.5em;text-indent:.5em;color:var(--dourado);}
  h1{font-family:var(--fonte-display);font-size:clamp(34px,7.5vmin,96px);line-height:.95;
    text-transform:uppercase;margin-top:.5vmin;}
  h1 .destaque{color:var(--verde-copapa);}
  .sub{margin-top:1vmin;font-size:clamp(14px,2.4vmin,26px);opacity:.9;}
  .sub b{color:var(--dourado);}
  #placar{flex:1;width:min(94vw,1100px);margin-top:2.5vmin;display:flex;flex-direction:column;}
  table{width:100%;border-collapse:separate;border-spacing:0 1vmin;
    font-family:var(--fonte-display);font-size:clamp(20px,4.4vmin,58px);letter-spacing:.03em;}
  td{background:rgba(0,10,35,.5);padding:.24em .6em;line-height:1.05;}
  tr td:first-child{border-radius:16px 0 0 16px;color:var(--dourado);width:2.4em;text-align:center;}
  tr td:nth-child(2){width:2em;text-align:center;}
  tr td:nth-child(3){}
  tr td:nth-child(4){opacity:.75;font-size:.55em;vertical-align:middle;}
  tr td:last-child{border-radius:0 16px 16px 0;text-align:right;color:var(--creme);}
  tr.top1 td{background:rgba(201,162,75,.28);color:var(--creme);border-top:2px solid var(--dourado);border-bottom:2px solid var(--dourado);}
  tr.top1 td:first-child{border-left:2px solid var(--dourado);}
  tr.top1 td:last-child{border-right:2px solid var(--dourado);}
  #aviso{text-align:center;font-size:clamp(16px,3vmin,32px);opacity:.85;padding:6vmin 0;}
  footer{width:min(94vw,1100px);display:flex;justify-content:space-between;align-items:center;
    font-size:clamp(12px,2vmin,22px);opacity:.85;font-family:var(--fonte-display);letter-spacing:.12em;}
  #status{color:var(--verde-copapa);}
  #status.off{color:var(--rosa);}
</style>

<body>
<header>
  <div class="marca">COPAPA · DESDE 1960</div>
  <h1>CORRIDA DO <span class="destaque">CARINHO</span></h1>
  <p class="sub">MELHORES DE HOJE — <b id="dia">…</b> · prêmio às 22h para os 3 primeiros</p>
</header>
<div id="placar"><div id="aviso">Carregando ranking…</div></div>
<footer>
  <span id="partidas">—</span>
  <span id="status">● AO VIVO</span>
  <span id="relogio">—</span>
</footer>

<script>
'use strict';
/* ============ CONFIGURAÇÃO — use os MESMOS dados do index.html ============ */
const EVENTO = {
  projetoFirebase: 'copapa-corrida',              // ← PREENCHER (igual ao index.html)
  apiKey: 'AIzaSyBvadiUFICqo0VcMjazhWeNCFhTHA93wY0',                       // ← PREENCHER (igual ao index.html)
  fusoHorario: 'America/Sao_Paulo'
};
/* Parâmetros opcionais na URL:
   ranking.html?origem=tablet   → mostra só partidas dos tablets do estande (ranking oficial)
   ranking.html?n=10            → quantidade de linhas (padrão 10)                          */
const params = new URLSearchParams(location.search);
const FILTRO_ORIGEM = params.get('origem') || '';
const LINHAS = Math.max(3, Math.min(20, parseInt(params.get('n') || '10', 10)));

function diaHoje(){
  return new Intl.DateTimeFormat('en-CA', {timeZone: EVENTO.fusoHorario}).format(new Date());
}
function diaBonito(){
  return new Intl.DateTimeFormat('pt-BR', {timeZone: EVENTO.fusoHorario,
    weekday:'long', day:'2-digit', month:'2-digit'}).format(new Date());
}
function nomeRanking(nome){
  const p = String(nome).trim().split(/\s+/);
  return p.length > 1 ? p[0] + ' ' + p[p.length-1].charAt(0).toUpperCase() + '.' : p[0];
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
const MEDALHAS = ['🥇','🥈','🥉'];

async function buscar(){
  const body = {structuredQuery:{
    from:[{collectionId:'ranking_' + diaHoje()}],
    orderBy:[{field:{fieldPath:'pontos'}, direction:'DESCENDING'}],
    limit: 300
  }};
  const r = await fetch('https://firestore.googleapis.com/v1/projects/' +
    EVENTO.projetoFirebase + '/databases/(default)/documents:runQuery?key=' + EVENTO.apiKey,
    {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)});
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const docs = await r.json();
  return docs.filter(d => d.document).map(d => {
    const f = d.document.fields;
    return {
      nome:      f.nome      ? f.nome.stringValue                    : '???',
      instagram: f.instagram ? f.instagram.stringValue               : '',
      origem:    f.origem    ? f.origem.stringValue                  : '',
      pontos:    f.pontos    ? parseInt(f.pontos.integerValue, 10)   : 0,
      criadoEm:  f.criadoEm  ? parseInt(f.criadoEm.integerValue, 10) : 0
    };
  }).sort((a,b) => b.pontos - a.pontos || a.criadoEm - b.criadoEm);
}

async function atualizar(){
  const status = document.getElementById('status');
  try{
    let lista = await buscar();
    document.getElementById('partidas').textContent = 'PARTIDAS HOJE: ' + lista.length +
      (lista.length >= 300 ? '+' : '');
    if (FILTRO_ORIGEM) lista = lista.filter(r => r.origem === FILTRO_ORIGEM);
    /* melhor pontuação por pessoa (@): cada jogador aparece uma vez */
    const vistos = new Set();
    lista = lista.filter(r => {
      const chave = r.instagram || r.nome;
      if (vistos.has(chave)) return false;
      vistos.add(chave); return true;
    }).slice(0, LINHAS);

    const placar = document.getElementById('placar');
    if (!lista.length){
      placar.innerHTML = '<div id="aviso">Ninguém jogou hoje ainda…<br>Seja o primeiro do ranking!</div>';
    } else {
      /* fonte se adapta à quantidade de linhas para caber na tela */
      const fonte = 'min(4.4vmin, ' + (30 / lista.length).toFixed(2) + 'vh)';
      let html = '<table style="font-size:' + fonte + '">';
      lista.forEach((r, i) => {
        html += '<tr class="' + (i === 0 ? 'top1' : '') + '">' +
          '<td>' + (i+1) + 'º</td>' +
          '<td>' + (MEDALHAS[i] || '') + '</td>' +
          '<td>' + escapeHtml(nomeRanking(r.nome)) +
            (r.instagram ? ' <span style="opacity:.55;font-size:.55em">@' + escapeHtml(r.instagram) + '</span>' : '') +
          '</td>' +
          '<td>' + (r.origem === 'tablet' ? 'ESTANDE' : '') + '</td>' +
          '<td>' + r.pontos.toLocaleString('pt-BR') + '</td></tr>';
      });
      placar.innerHTML = html + '</table>';
    }
    status.textContent = '● AO VIVO'; status.className = '';
  }catch(e){
    status.textContent = '● SEM CONEXÃO'; status.className = 'off';
    const aviso = document.getElementById('aviso');
    if (aviso) aviso.innerHTML = 'Aguardando conexão…<br><span style="font-size:.7em;opacity:.7">' +
      'Confira a internet e a configuração (projetoFirebase / apiKey) no ranking.html</span>';
  }
  document.getElementById('dia').textContent = diaBonito();
}

function relogio(){
  document.getElementById('relogio').textContent =
    new Intl.DateTimeFormat('pt-BR', {timeZone: EVENTO.fusoHorario,
      hour:'2-digit', minute:'2-digit', second:'2-digit'}).format(new Date());
}
atualizar(); relogio();
setInterval(atualizar, 10000);
setInterval(relogio, 1000);
</script>
